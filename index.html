<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#1a0f08" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="description" content="Descubre cómo miles de mujeres generan ingresos extra vendiendo postres caseros. Quiz personalizado gratuito." />

    <title>Quiz - Descubre tu Plan Personalizado</title>

    <!-- Meta Pixel Code — LOADS FIRST for accurate tracking -->

    n.queue=[];t=b.createElement(e);t.async=!0;

    <!-- Google Fonts: Nunito — NON-BLOCKING async load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />

    <!-- VTurb: DNS prefetch ONLY — scripts load dynamically after quiz completion -->
    <link rel="dns-prefetch" href="https://cdn.converteai.net" />
    <link rel="dns-prefetch" href="https://scripts.converteai.net" />

    <!-- CRITICAL: Inline CSS for instant splash (<50ms paint) — no FOUC -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{background:#1a0f08;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
      #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:linear-gradient(135deg,#1a0f08 0%,#2d1a0e 50%,#1a0f08 100%);font-family:'Nunito',system-ui,-apple-system,sans-serif;color:#fff8f0;padding:24px 16px;text-align:center}
      .s-badge{background:rgba(212,160,60,.15);border:1px solid rgba(212,160,60,.3);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;color:#d4a03c;margin-bottom:20px;display:inline-block}
      .s-title{font-size:22px;font-weight:800;line-height:1.35;max-width:440px;margin-bottom:14px}
      .s-sub{font-size:15px;color:#c4a882;line-height:1.5;max-width:400px;margin-bottom:20px}
      .s-list{list-style:none;padding:0;margin:0 0 24px;text-align:left;max-width:440px;width:100%}
      .s-list li{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:15px;color:#fff8f0}
      .s-btn{width:100%;max-width:440px;background:linear-gradient(90deg,#d4a03c,#b8860b);color:#1a0f08;border:none;border-radius:14px;padding:18px 24px;font-size:18px;font-weight:800;cursor:default;box-shadow:0 4px 15px rgba(212,160,60,.4);min-height:56px;font-family:inherit;opacity:.5;pointer-events:none}
      .s-load{color:#c4a882;font-size:12px;margin-top:12px;display:flex;align-items:center;gap:8px;justify-content:center}
      .s-dot{width:6px;height:6px;background:#d4a03c;border-radius:50%;animation:blink 1.2s infinite}
      .s-dot:nth-child(2){animation-delay:.2s}
      .s-dot:nth-child(3){animation-delay:.4s}
      @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
      @media(max-width:360px){.s-title{font-size:19px}}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- INSTANT SPLASH: visible in <50ms, replaced by React on hydration -->
      <div id="splash">
        <div class="s-badge">🍮 Quiz de Personalización Gratuito</div>
        <div class="s-title">¿Sabías que miles de mujeres ya generan ingresos vendiendo postres caseros?</div>
        <div class="s-sub">Responde 6 preguntas rápidas y descubre si este método es para ti — adaptado a tu situación.</div>
        <ul class="s-list">
          <li>✅ Solo toma 2 minutos</li>
          <li>✅ 100% gratis</li>
          <li>✅ Recibes un plan personalizado</li>
        </ul>
        <button class="s-btn">Comenzar Quiz Gratis →</button>
        <div class="s-load">
          <span>Cargando</span>
          <span class="s-dot"></span>
          <span class="s-dot"></span>
          <span class="s-dot"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
