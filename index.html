    <!-- CRITICAL: Inline CSS for instant splash (<50ms paint) — FIX 1: bege quente -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{background:#f7f3ee;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
      #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:#f7f3ee;font-family:'Nunito',system-ui,-apple-system,sans-serif;color:#2d1b0e;padding:24px 20px;text-align:center}
      .s-badge{background:#d63031;border:none;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;color:#ffffff;margin-bottom:20px;display:inline-block}
      .s-title{font-size:clamp(18px,4.5vw,22px);font-weight:800;line-height:1.4;max-width:440px;margin-bottom:14px;color:#2d1b0e}
      .s-sub{font-size:15px;color:#6b4c38;line-height:1.5;max-width:400px;margin-bottom:20px}
      .s-list{list-style:none;padding:0;margin:0 0 24px;text-align:left;max-width:440px;width:100%}
      .s-list li{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:15px;color:#3d2b1f}
      .s-btn{width:100%;max-width:440px;background:linear-gradient(135deg,#d63031,#c0392b);color:#ffffff;border:none;border-radius:14px;padding:18px 24px;font-size:18px;font-weight:800;cursor:default;box-shadow:0 6px 24px rgba(214,48,49,.35);min-height:60px;font-family:inherit;opacity:.5;pointer-events:none}
      .s-load{color:#6b4c38;font-size:12px;margin-top:12px;display:flex;align-items:center;gap:8px;justify-content:center}
      .s-dot{width:6px;height:6px;background:#d63031;border-radius:50%;animation:blink 1.2s infinite}
      .s-dot:nth-child(2){animation-delay:.2s}
      .s-dot:nth-child(3){animation-delay:.4s}
      @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
      @media(max-width:360px){.s-title{font-size:18px}}
